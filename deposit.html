<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Fontawesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!--Estilos-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header class="d-flex justify-content-between align-items-center">
        <a href="menu.html" class="btn btn-succes"><i class="fa-solid fa-reply"></i></a>
        <div class="d-flex justify-content-center align-items-center flex-wrap">
            <img src="assets/img/logo-aw.svg" alt="logo de alke wallet">
            <h1>Alke Wallet</h1>
        </div>
        <button class="btn btn-danger" id="logout">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </header>
    <main>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8">
                    <div id="mensaje"></div>
                    <h2 class="text-center mb-4">Deposita en tu cuenta</h2>
                    <form id="form-deposito">
                        <div class="mb-3">
                            <label for="monto" class="form-label">Monto a depositar:</label>
                            <input type="number" name="monto" class="form-control" id="monto"
                                placeholder="Ingrese el monto a depositar">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Ingrese su contraseña:</label>
                            <input type="password" name="passwordDeposit" class="form-control" id="passwordDeposit"
                                placeholder="Ingrese contraseña">
                        </div>
                        <button class="btn btn-success mt-3 w-100">Depositar</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p class="text-center">© 2026 Alke Wallet</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("form-deposito").addEventListener("submit", function (event) {
            event.preventDefault();

            const monto = document.getElementById("monto").value;
            const passwordDeposit = document.getElementById("passwordDeposit").value;

            let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

            const usuarioEncontrado = usuarios.find(function (password) {
                password === passwordDeposit;
            });

            if (usuarioEncontrado) {
                localStorage.setItem("usuarioLogueado", JSON.stringify(usuarioEncontrado));

                document.getElementById("mensaje").innerHTML = `
                <div class="alert alert-success alert-dismissible fade show">
                    Depósito exitoso.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                setTimeout(() => {
                    window.location.href = "menu.html"
                }, 3000);
            } else {
                document.getElementById("mensaje").innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show">
                    Contraseña incorrecta
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;

                setTimeout(() => {
                    document.getElementById("mensaje").innerHTML = "";
                }, 3000);
            }





        })
    </script>
</body>
<script src="assets/js/script.js"></script>

</html>
