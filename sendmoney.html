<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Fontawesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!--Estilos-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header class="d-flex justify-content-between align-items-center">
        <a href="menu.html" class="btn btn-succes"><i class="fa-solid fa-reply"></i></a>
        <div class="d-flex justify-content-center align-items-center flex-wrap">
            <img src="assets/img/logo-aw.svg" alt="logo de alke wallet">
            <h1>Alke Wallet</h1>
        </div>
        <button class="btn btn-danger" id="logout">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </header>
    <main>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8">
                    <div id="mensaje"></div>
                    <h2 class="text-center mb-4">Enviar dinero</h2>
                    <form id="form-enviar-dinero">
                        <div class="mb-3">
                            <label for="destinatario" class="form-label">Nombre del destinatario:</label>
                            <input type="text" name="nombre" class="form-control" id="nombre"
                                placeholder="Ingrese nombre del destinatario">
                        </div>
                        <div class="mb-3">
                            <label for="monto" class="form-label">Número de cuenta:</label>
                            <input type="number" name="cuenta-destino" class="form-control" id="cuenta-destino"
                                placeholder="Ingrese número de cuenta del destinatario">
                        </div>
                        <div class="mb-3">
                            <label for="monto" class="form-label">Monto a enviar:</label>
                            <input type="number" name="monto" class="form-control" id="monto"
                                placeholder="Ingrese monto a enviar">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña:</label>
                            <input type="password" name="password" class="form-control" id="password"
                                placeholder="Ingrese contraseña">
                        </div>
                        <button class="btn btn-success mt-3 w-100">Enviar dinero</button>
                        <button class="btn btn-success mt-3 w-100">Agregar nuevo contacto</button>
                    </form>
                </div>
            </div>
        </div>



    </main>

    <footer>
        <p class="text-center">© 2026 Alke Wallet</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
<script src="assets/js/script.js"></script>

</html>
